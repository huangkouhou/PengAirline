name: Backend CD to OCI

on:
  push:
    branches: [ "feature/cloud-deploy" ]
    # paths:
    #   - 'backend/**'
    #   - '.github/workflows/backend-cicd.yml'

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push
        uses: docker/build-push-action@v4
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          # 你的 OCI 是 ARM 架构，这个很重要
          tags: ${{ secrets.DOCKER_USERNAME }}/airline-backend:latest
          platforms: linux/arm64

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to OCI
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.OCI_HOST }}
          username: ${{ secrets.OCI_USERNAME }}
          key: ${{ secrets.OCI_SSH_KEY }} 
          script: |
            # 1. 进入目录
            cd /home/opc/pengairline
            
            # 2. 拉取最新镜像 (纯 Docker 操作，不需要 Git)
            sudo docker compose pull airline-backend
            
            # 3. 重启后端容器
            # up -d 会自动重新创建容器，实现平滑更新
            sudo docker compose up -d airline-backend
            
            # 4. 清理旧镜像
            sudo docker image prune -f