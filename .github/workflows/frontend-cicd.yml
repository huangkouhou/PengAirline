name: Frontend CICD

on:
  push:
    branches: [ "feature/cloud-deploy" ]
    paths:
      # 监听前端目录修改
      - 'frontend/**'
      # 监听本文件修改
      - '.github/workflows/frontend-cicd.yml'

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      # 1. 设置 QEMU (非常重要！为了支持 OCI 的 ARM 架构)
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2

      # 2. 设置 Docker Buildx
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      # 3. 登录 Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 4. 构建并推送
      # 注意：这里我们不需要 npm install/build，因为通常这都在 Dockerfile 里写好了(多阶段构建)
      - name: Build and push
        uses: docker/build-push-action@v4
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          # 你的前端镜像名
          tags: ${{ secrets.DOCKER_USERNAME }}/airline-frontend:latest
          # ⚠️ 关键：必须构建 ARM64 版本，否则你的 Nginx 在服务器上跑不起来
          platforms: linux/arm64

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to OCI
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.OCI_HOST }}
          username: ${{ secrets.OCI_USERNAME }}
          key: ${{ secrets.OCI_SSH_KEY }}
          script: |
            # 1. 进入项目目录
            cd /home/opc/pengairline
            
            # 2. 拉取最新的前端镜像
            # 注意：名字必须和 docker-compose.yml 里的 service 名字一致
            sudo docker compose pull airline-frontend
            
            # 3. 重新创建并启动前端容器
            sudo docker compose up -d airline-frontend
            
            # 4. 清理旧镜像
            sudo docker image prune -f