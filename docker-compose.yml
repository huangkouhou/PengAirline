version: "3.8"

services:
  # 1. 数据库服务
  mysqldb:
    image: mysql:8.0
    container_name: airline-db
    platform: linux/arm64 
    environment:
      MYSQL_ROOT_PASSWORD: 3541275Hh!  
      MYSQL_DATABASE: flightdb
    volumes:
      - mysql_data:/var/lib/mysql
      - ./db-init/flightdb:/docker-entrypoint-initdb.d/init.sql
    networks:
      - library-net


  # 2. 后端服务
  backend:
    image: huangkouhou/airline-backend:latest
    container_name: airline-backend
    restart: always
    expose:
      - "8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysqldb:3306/flightbd?useSSL=false&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: 3541275Hh! 
      SPRING_DATA_REST_BASE_PATH: /api
      
    depends_on:
      - mysqldb
    networks:
      - library-net


  # 3. 前端服务
  frontend:
    image: huangkouhou/airline-frontend:latest
    container_name: airline-frontend
    restart: always
    expose:
      - "80"
    volumes:
          - ./nginx/react.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
          - library-net

  # 4. 使用 Library 项目里现有的 Nginx 来反向代理这个项目

volumes:
    airline_mysql_data:
networks:
    library-net:
      name: library-app_library-net
      external: true
